<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dogpile Level Editor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>🎮 Dogpile Level Editor</h1>
            <p>9×9 Grid Level Designer</p>
        </header>

        <div class="main-layout">
            <!-- Left Panel: Grid Editor -->
            <div class="editor-panel">
                <div class="grid-container">
                    <canvas id="gridCanvas" width="540" height="540"></canvas>
                </div>

                <div class="editor-controls">
                    <div class="mode-selector">
                        <label>Edit Mode:</label>
                        <button id="modeHeight" class="mode-btn active">Height</button>
                        <button id="modeEntity" class="mode-btn">Entity</button>
                    </div>

                    <div id="heightControls" class="control-section">
                        <label>Height Value (0-255):</label>
                        <input type="range" id="heightSlider" min="0" max="15" value="0">
                        <input type="number" id="heightInput" min="0" max="255" value="0">
                    </div>

                    <div id="entityControls" class="control-section" style="display: none;">
                        <label>Entity Type:</label>
                        <select id="entityType">
                            <option value="0">None (Clear)</option>
                            <option value="s">Spawn Point</option>
                            <option value="a">Red Arrow</option>
                            <option value="p">Pressure Plate</option>
                            <option value="d">Door</option>
                            <option value="i">Piston</option>
                        </select>

                        <div id="channelControl" style="display: none;">
                            <label>Channel (0-15):</label>
                            <input type="number" id="channelInput" min="0" max="15" value="0">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Info & Export -->
            <div class="info-panel">
                <div class="info-section">
                    <h3>Selected Cell</h3>
                    <div id="cellInfo">
                        <p>Click a cell to select</p>
                    </div>
                </div>

                <div class="info-section">
                    <h3>Level Summary</h3>
                    <div id="levelSummary">
                        <p>Entities: 0</p>
                        <p>Max Height: 0</p>
                    </div>
                </div>

                <div class="info-section">
                    <h3>Entity Legend</h3>
                    <div class="legend">
                        <div class="legend-item"><span class="legend-color arrow"></span> Red Arrow</div>
                        <div class="legend-item"><span class="legend-color spawn"></span> Spawn</div>
                        <div class="legend-item"><span class="legend-color plate"></span> Pressure Plate</div>
                        <div class="legend-item"><span class="legend-color door"></span> Door</div>
                        <div class="legend-item"><span class="legend-color piston"></span> Piston</div>
                    </div>
                </div>

                <div class="actions">
                    <button id="clearBtn" class="action-btn">Clear All</button>
                    <button id="downloadBtn" class="action-btn primary">Download Binary</button>
                    <button id="exportCmdBtn" class="action-btn">Export Command</button>
                </div>

                <div class="info-section">
                    <h3>Load Level</h3>
                    <input type="file" id="fileInput" accept=".bin,*">
                </div>

                <div id="commandOutput" class="command-output" style="display: none;">
                    <h4>Python Command:</h4>
                    <pre id="commandText"></pre>
                    <button id="copyCmd" class="action-btn small">Copy</button>
                </div>
            </div>
        </div>
    </div>

    <script src="editor.js"></script>
</body>

</html>
