<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First-Person 3D Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            background: #000;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: pointer;
            z-index: 10;
        }

        #overlay h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.8);
        }

        #overlay p {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 2rem;
        }

        #overlay .instructions {
            font-size: 0.9rem;
            opacity: 0.6;
            text-align: center;
            line-height: 1.8;
        }

        #timer-bar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 8px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            z-index: 5;
            overflow: hidden;
        }

        #timer-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #4ecdc4, #44a08d);
            transition: width 0.05s linear;
            border-radius: 3px;
        }

        #timer-fill.warning {
            background: linear-gradient(90deg, #f39c12, #e74c3c);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.6;
            }

            50% {
                opacity: 1.0;
            }
        }

        #timer-fill.waiting {
            animation: pulse 1.5s ease-in-out infinite;
        }

        #ghost-count {
            position: fixed;
            top: 35px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 12px;
            z-index: 5;
        }

        /* Joystick Controls */
        #joystick-zone {
            position: fixed;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            z-index: 20;
            touch-action: none;
            display: none;
            /* Hidden by default, shown via JS if touch */
        }

        #joystick-base {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            position: relative;
        }

        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* Show joystick on touch devices or when class added */
        @media (hover: none) and (pointer: coarse) {
            #joystick-zone {
                display: block;
            }

            .instructions {
                display: none;
            }
        }

        body.touch-active #joystick-zone {
            display: block;
        }

        /* Jump Button */
        #jump-button {
            position: fixed;
            bottom: 60px;
            left: 200px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.4);
            display: none;
            z-index: 20;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: bold;
            user-select: none;
        }

        #jump-button.pressed {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0.95);
        }

        @media (hover: none) and (pointer: coarse) {
            #jump-button {
                display: flex;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="overlay">
        <h1>Escape Room</h1>
        <p>Click to start</p>
        <div class="instructions">
            WASD / Arrow Keys - Move<br>
            Space - Jump<br>
            Touch: Use joystick + button
        </div>
    </div>
    <div id="timer-bar" class="hidden">
        <div id="timer-fill"></div>
    </div>
    <div id="ghost-count" class="hidden">Ghosts: 0/8</div>

    <!-- Touch Controls -->
    <div id="joystick-zone" class="hidden">
        <div id="joystick-base">
            <div id="joystick-knob"></div>
        </div>
    </div>
    
    <button id="jump-button" class="hidden">JUMP</button>

    <canvas id="glCanvas"></canvas>
    <script src="src/math.js"></script>
    <script src="src/player.js"></script>
    <script src="src/ghost.js"></script>
    <script src="src/pressureplate.js"></script>
    <script src="src/room.js"></script>
    <script src="src/main.js"></script>
</body>

</html>
